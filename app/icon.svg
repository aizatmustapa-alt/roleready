  <line x1="77" y1="22" x2="86" y2="19" stroke="#2200ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="16" x2="84" y2="11" stroke="#2200ff" stroke-width="3" stroke-linecap="round"/>
</svg>
